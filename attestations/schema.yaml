# Attestation Schema for compliance-ops-bedrock
#
# Each attestation file follows this structure.
# The schema is intentionally simple and human-writable.
# Tooling must validate the required fields; optional fields carry meaning.
#
# Design rationale (Maria's insight, 2026-04-12):
#   A field value alone ("exception: true") destroys the reasoning.
#   Auditors want the REASONING, not just the decision.
#   Every attestation therefore requires a prose justification.
#   Version history (via git) is the audit trail — DO NOT amend commits.
#
# Required fields for every attestation:
#   id:           unique identifier (kebab-case)
#   control-id:   maps to a control in one of the OSCAL catalogs
#   status:       satisfied | partial | not-satisfied | not-applicable | exception
#   decision:     one sentence — what was decided
#   justification: prose — WHY this decision was made, context, reasoning.
#                 Write as if it will be published. Embarrassment is the
#                 accountability surface. "Status: partial" is not a
#                 justification; what is missing and why is the justification.
#   reviewed-by:  name or role of the person who attested this review
#   reviewed-at:  ISO 8601 datetime — timestamp of THIS review, not of
#                 implementation. Attestation drift (reviewed-at is stale
#                 because the system changed) is a known failure mode.
#   built-by:     name or role of the person who implemented this control.
#                 When reviewed-by == built-by, an auditor can see that.
#                 A system that architecturally cannot separate these roles
#                 because it has one engineer is different from one that
#                 chose not to separate them. The field documents the fact.
#
# Optional fields:
#   expires-at:   for exceptions and time-bounded decisions
#   evidence-refs: list of file paths or S3 URIs pointing to supporting evidence
#   related-controls: other control-ids affected by this decision
#   compensating-controls: what mitigates risk when status is partial/exception
#
# Status values:
#   satisfied:       control fully implemented, evidence available
#   partial:         control partially implemented; compensating-controls required
#   not-satisfied:   control not implemented; must become an action item
#   not-applicable:  control does not apply; justification must explain why
#   exception:       conscious risk acceptance; expires-at required
#
# Separation of duties note (Maria, 2026-04-13):
#   Code can check that two people signed. It cannot check that the second
#   person read what they signed. This schema does not solve that problem.
#   The discipline of writing honest justifications does.
#
#   Self-attestation failure modes to be aware of (not prevented, made visible):
#   - Social pressure to mark things green
#   - Attestation by the person least qualified to assess the risk
#   - Attestation drift: reviewed-at is months old but system changed
#   - Moral licensing: team relaxes because the file says satisfied
#
#   None of these are preventable in YAML. They are made visible by:
#   (1) naming the reviewer, (2) naming the builder separately, (3) requiring
#   prose justification that would embarrass someone if published,
#   (4) using git timestamps and commit history as the objective audit trail.

# Example attestation (not a real attestation — for documentation only):
# ---
# id: example-attestation-001
# control-id: gdpr-32
# status: satisfied
# decision: >
#   Encryption at rest (KMS) and in transit (TLS 1.2+) are implemented for
#   all data stores and transit paths in the compliance-ops-bedrock system.
# justification: >
#   All S3 buckets are configured with SSE-KMS using a customer-managed key.
#   DynamoDB is encrypted at rest by default (AWS-managed key). All API
#   endpoints enforce HTTPS. Internal service-to-service calls use AWS
#   PrivateLink where available, otherwise TLS. The decision to use
#   AWS-managed KMS keys rather than customer-managed keys was made because
#   the additional operational burden of CMK rotation does not reduce risk
#   meaningfully at this scale — the risk profile is low (demo system,
#   no production personal data). This decision must be revisited if the
#   system moves to production with real user data.
# reviewed-by: Priya (principal engineer, zoo)
# reviewed-at: "2026-04-12T12:00:00Z"
# evidence-refs:
#   - infra/terraform/s3.tf  # SSE-KMS configuration
#   - evidence/automated/kms-key-list.json  # generated by evidence-collector
