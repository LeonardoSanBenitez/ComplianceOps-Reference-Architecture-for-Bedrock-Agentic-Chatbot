  - id: gdpr-35-dpia-001
    control-id: gdpr-35
    status: not-applicable
    decision: >
      A DPIA is not required for this demo system in its current form;
      determination must be revisited at pre-production review.
    justification: >
      A DPIA is not required at this stage. The current system does not process
      real personal data; it uses only synthetic and test conversations. Under
      the GDPR Art. 35 criteria and the EDPB guidelines on DPIA triggering
      thresholds, a single-purpose demo chatbot with no persistent user
      profiling, no special categories of data, no systematic large-scale
      processing, and no automated decisions affecting individuals does not meet
      any mandatory DPIA trigger. This determination must be revisited before
      production deployment, particularly if the chatbot is made available to
      real users, if conversation logs are retained and linked to identifiable
      individuals, or if the system is integrated with other data sources.
      Status: not-applicable for current prototype; assessment to be repeated
      at pre-production review gate.
