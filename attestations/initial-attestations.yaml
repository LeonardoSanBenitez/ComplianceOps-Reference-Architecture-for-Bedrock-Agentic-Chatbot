  - id: euaia-52-2-copyright-001
    control-id: euaia-52-2
    status: satisfied
    decision: >
      Provider-side copyright compliance is documented by AWS; no deployer-level
      copyright obligation exists for inference use.
    justification: >
      Amazon has published statements on training data provenance for Nova
      models as part of its AWS Responsible AI practices. As a deployer, the
      obligation is to confirm that the model provider has a published copyright
      compliance policy — not to audit the training data ourselves. Amazon's
      published Acceptable Use Policy and model documentation cover this. For
      Mistral AI models (available as fallback), Mistral AI has published
      similar commitments. This control is satisfied at the deployer level with
      reference to provider documentation; no deployer-level copyright
      obligation applies for inference use.
      Status: satisfied — provider documentation referenced.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

