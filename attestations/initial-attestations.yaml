  - id: euaia-50-1-disclosure-001
    control-id: euaia-50-1
    status: satisfied
    decision: >
      AI disclosure is implemented at the API layer: every response includes
      an ai_disclosure field in the JSON body and the system prompt instructs
      the model to self-identify as AI. Becomes enforceable 2026-08-02.
    justification: >
      The application layer (app/handler.py) implements AI disclosure at the
      API level in three complementary ways: (1) the JSON response body includes
      an ai_disclosure field on every response explicitly stating the system is
      AI-generated and not legal advice; (2) the X-AI-Generated: true HTTP
      response header provides a machine-readable signal for downstream
      integrations; (3) the agent system prompt (app/agent.py) instructs the
      model to identify itself as an AI system if asked, and the system prompt
      is itself prefixed with this declaration. This implementation satisfies
      Art. 50(1) transparency obligations at the API/system layer. A consumer
      UI would additionally need to display a visible label before the first
      message; this is documented as a requirement for any UI built on this API.
      The B2B "obvious" exception is deliberately not relied upon — see prior
      justification. This control becomes enforceable 2026-08-02.
      Status: satisfied at API layer.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-25T08:00:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - app/handler.py
      - app/agent.py

  - id: euaia-50-2-content-marking-001
    control-id: euaia-50-2
    status: satisfied
    decision: >
      X-AI-Generated: true header and ai_disclosure JSON field are implemented
      on every response. No statistical watermarking required for text at this
      time (Commission technical standards not yet adopted).
    justification: >
      The application layer (app/handler.py) adds X-AI-Generated: true and
      X-AI-System: compliance-ops-bedrock-demo HTTP headers to every response,
      and includes an ai_disclosure field in the JSON response body. This
      provides machine-readable AI content marking for downstream systems.
      Statistical watermarking (e.g., C2PA) is not required for text-only
      responses: as of April 2026 the Commission has not adopted binding
      technical standards under Art. 50(2) for text content, and the current
      obligation is met by disclosure headers and labels. The compliance report
      generated by scripts/generate_report.py carries a "Disclaimer: This is a
      prototype report" note; any future LLM-assisted content in reports would
      require an explicit AI-generated metadata field. Status: satisfied.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-25T08:00:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - app/handler.py

