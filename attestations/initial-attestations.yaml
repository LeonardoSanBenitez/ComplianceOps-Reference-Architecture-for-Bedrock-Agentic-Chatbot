  - id: gdpr-13-transparency-001
    control-id: gdpr-13
    status: not-satisfied
    decision: >
      No privacy notice exists; the UI has not been built and no real
      personal data is collected.
    justification: >
      No privacy notice exists because no end-user-facing interface has been
      built and no real personal data is collected. When the chat interface is
      developed, a privacy notice must be presented before or at the time of
      first use. The notice must identify the controller, state the legal basis
      for processing, describe what conversation data is retained, name AWS as
      data processor, state the retention period, and enumerate data subject
      rights including the right of erasure. A draft privacy notice is an
      action item for the next sprint. Status: not-implemented — no UI, no
      real data subjects; notice is a prerequisite before any real-user
      deployment.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-17-erasure-001
    control-id: gdpr-17
    status: not-satisfied
    decision: >
      No personal data is currently stored; erasure procedure is designed
      but not yet documented or tested.
    justification: >
      No personal data is currently stored; the erasure right is therefore not
      yet triggered. The architecture must include a documented deletion
      procedure covering all data stores: DynamoDB conversation records (TTL
      or API deletion), S3 conversation logs (object deletion via lifecycle
      rule or API), CloudWatch logs (log group deletion or data protection
      policy), and any data that may have been passed to Bedrock for inference
      (AWS confirms it does not retain customer data from Bedrock API calls for
      model training). This procedure must be written, tested with a dry run,
      and referenced in the ROPA before real user data is ingested.
      Status: not-implemented — procedure designed in principle; not yet
      documented or tested.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-25-privacy-by-design-001
    control-id: gdpr-25
    status: partial
    decision: >
      Several architectural decisions reflect privacy-by-design intent;
      pseudonymisation and formal DPIA screening are outstanding.
    justification: >
      Several architectural decisions reflect privacy-by-design intent:
      (1) conversation logging is not enabled by default in the current
      prototype, (2) the model selected (Nova Micro) is the lowest-capability
      model sufficient for the demo purpose, minimising data exposure,
      (3) the Bedrock agent does not use a persistent memory store across
      sessions, (4) IAM roles follow least-privilege. Gaps: the system does
      not yet implement pseudonymisation for any stored content, and a formal
      Data Protection Impact Assessment screening has not been documented.
      Status: partial — structural choices are privacy-aware; pseudonymisation
      and formal screening outstanding.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-28-dpa-001
    control-id: gdpr-28
    status: satisfied
    decision: >
      AWS is the sole data processor; a valid DPA is incorporated into the
      AWS Customer Agreement accepted upon account creation.
    justification: >
      AWS is the sole data processor for this system. A valid Data Processing
      Addendum is incorporated into the AWS Customer Agreement, accepted upon
      account creation. AWS's GDPR DPA covers all sub-processors used by this
