# Initial attestations for compliance-ops-bedrock demo system
# Status: prototype / exploration phase
# These attestations are NOT authoritative compliance evidence.
# They serve to test the schema, the tooling, and the reporting pipeline.
#
# Prose justifications authored with Maria's review (2026-04-13).
# Mark's Art. 50 research (2026-04-13) informed euaia-50-1 and euaia-50-2.
# Last updated: 2026-04-13

attestations:

  # ── GDPR ─────────────────────────────────────────────────────────────────

  - id: gdpr-5-1-a-lawfulness-001
    control-id: gdpr-5-1-a
    status: partial
    decision: >
      Processing of conversation data in the demo system has a tentative legal
      basis (legitimate interest) but a full LIA has not been completed.
    justification: >
      The system currently processes only synthetic and test conversation data;
      no real user personal data is collected. For a future production
      deployment, the most probable lawful basis under Art. 6(1)(f) would be
      legitimate interest for internal quality monitoring, provided a Legitimate
      Interest Assessment (LIA) is completed and documented. Fairness is
      addressed by limiting the chatbot's stated purpose to answering questions
      about its own architecture; no profiling or secondary use is performed.
      Transparency will require a privacy notice before first user interaction.
      Status: partial — architecture is privacy-aware but the LIA and privacy
      notice are not yet completed.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
    compensating-controls:
      - Only synthetic/test data used in current prototype
      - No real user personal data ingested

  - id: gdpr-5-1-b-purpose-001
    control-id: gdpr-5-1-b
    status: partial
    decision: >
      The demo system has a clearly scoped purpose; formal ROPA entry and
      written prohibition on secondary use are outstanding.
    justification: >
      The demo system collects and processes conversation data solely to
      evaluate system performance and demonstrate compliance tooling. No
      secondary use is intended or architecturally supported. The Bedrock
      agent configuration does not retain conversation history across sessions
      beyond the current interaction window. A production deployment would need
      to explicitly prohibit reuse of conversation logs for model training or
      advertising purposes, documented in the ROPA and the DPA with AWS.
      Status: partial — purpose is clearly scoped in this document; formal
      prohibition and ROPA entry are outstanding.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
    compensating-controls:
      - No real personal data processed
      - Architecture does not include cross-session memory or training loop

  - id: gdpr-5-1-e-retention-001
    control-id: gdpr-5-1-e
    status: not-satisfied
    decision: >
      No retention policy is currently implemented; storage infrastructure
      is not yet provisioned.
    justification: >
      No conversation storage is currently implemented. The architecture
      anticipates S3 lifecycle policies and DynamoDB TTL settings for a 30-day
      retention window, which is the minimum necessary for quality monitoring.
      This period is not yet justified in writing. When storage is provisioned,
      the Terraform configuration must include automated deletion, and a written
      rationale for the retention period must accompany the first deployment to
      a production account. Status: not-implemented — storage infrastructure
      not yet provisioned; retention mechanism designed but not deployed.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-5-1-f-integrity-001
    control-id: gdpr-5-1-f
    status: partial
    decision: >
      Account-level security controls are implemented and evidenced;
      application-level encryption is designed but not yet deployed.
    justification: >
      Account-level security controls are implemented and evidenced:
      GuardDuty threat detection is active, CloudTrail provides a 90-day
      audit log, IAM enforces a 16-character minimum password with MFA on
      administrative accounts, and S3 public access is blocked at the account
      level. Application-level encryption (KMS for S3 buckets, TLS-only API
      endpoints, least-privilege Lambda/Bedrock IAM roles) is designed in the
      Terraform modules but not yet deployed because the application layer has
      not been provisioned. No personal data traverses the system in its
      current state. Status: partial — account-level controls implemented;
      application-layer encryption pending deployment.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - evidence/automated/guardduty-status.json
      - evidence/automated/cloudtrail-status.json
      - evidence/automated/iam-password-policy.json
    compensating-controls:
      - No real personal data processed yet
      - Account-level GuardDuty active

  - id: gdpr-13-transparency-001
    control-id: gdpr-13
    status: not-satisfied
    decision: >
      No privacy notice exists; the UI has not been built and no real
      personal data is collected.
    justification: >
      No privacy notice exists because no end-user-facing interface has been
      built and no real personal data is collected. When the chat interface is
      developed, a privacy notice must be presented before or at the time of
      first use. The notice must identify the controller, state the legal basis
      for processing, describe what conversation data is retained, name AWS as
      data processor, state the retention period, and enumerate data subject
      rights including the right of erasure. A draft privacy notice is an
      action item for the next sprint. Status: not-implemented — no UI, no
      real data subjects; notice is a prerequisite before any real-user
      deployment.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-17-erasure-001
    control-id: gdpr-17
    status: not-satisfied
    decision: >
      No personal data is currently stored; erasure procedure is designed
      but not yet documented or tested.
    justification: >
      No personal data is currently stored; the erasure right is therefore not
      yet triggered. The architecture must include a documented deletion
      procedure covering all data stores: DynamoDB conversation records (TTL
      or API deletion), S3 conversation logs (object deletion via lifecycle
      rule or API), CloudWatch logs (log group deletion or data protection
      policy), and any data that may have been passed to Bedrock for inference
      (AWS confirms it does not retain customer data from Bedrock API calls for
      model training). This procedure must be written, tested with a dry run,
      and referenced in the ROPA before real user data is ingested.
      Status: not-implemented — procedure designed in principle; not yet
      documented or tested.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-25-privacy-by-design-001
    control-id: gdpr-25
    status: partial
    decision: >
      Several architectural decisions reflect privacy-by-design intent;
      pseudonymisation and formal DPIA screening are outstanding.
    justification: >
      Several architectural decisions reflect privacy-by-design intent:
      (1) conversation logging is not enabled by default in the current
      prototype, (2) the model selected (Nova Micro) is the lowest-capability
      model sufficient for the demo purpose, minimising data exposure,
      (3) the Bedrock agent does not use a persistent memory store across
      sessions, (4) IAM roles follow least-privilege. Gaps: the system does
      not yet implement pseudonymisation for any stored content, and a formal
      Data Protection Impact Assessment screening has not been documented.
      Status: partial — structural choices are privacy-aware; pseudonymisation
      and formal screening outstanding.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-28-dpa-001
    control-id: gdpr-28
    status: satisfied
    decision: >
      AWS is the sole data processor; a valid DPA is incorporated into the
      AWS Customer Agreement accepted upon account creation.
    justification: >
      AWS is the sole data processor for this system. A valid Data Processing
      Addendum is incorporated into the AWS Customer Agreement, accepted upon
      account creation. AWS's GDPR DPA covers all sub-processors used by this
      project: Bedrock (model inference), S3 (storage), DynamoDB (session
      data), CloudTrail (audit logging), and GuardDuty (threat detection).
      Amazon's model providers accessed through Bedrock (Amazon Nova, Mistral
      AI) are listed in AWS's sub-processor disclosure. No additional DPA is
      required for this configuration. Evidence: AWS Customer Agreement
      acceptance date in account settings; AWS sub-processor list at
      aws.amazon.com/compliance/sub-processors. Status: satisfied.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - https://aws.amazon.com/agreement

  - id: gdpr-30-ropa-001
    control-id: gdpr-30
    status: not-satisfied
    decision: >
      No ROPA entry exists; none is needed while only synthetic data is
      processed, but must be created before any real-data deployment.
    justification: >
      No ROPA entry exists because no real personal data is currently processed.
      A ROPA entry for the chatbot processing activity must be created before
      any real user data is ingested. The entry must document: controller
      identity and contact details, DPO contact if applicable, purpose (quality
      monitoring of chatbot responses), categories of data subjects (users of
      the demo system), categories of personal data (conversation text, session
      identifiers, IP addresses if logged), recipients (AWS sub-processors),
      transfers outside the EU if applicable (AWS us-east-1 is outside the EU;
      Standard Contractual Clauses are incorporated into the AWS DPA), retention
      period (30 days proposed), and security measures (KMS, TLS, IAM,
      GuardDuty). Status: not-implemented — prerequisite for any real-data
      deployment; no urgency while prototype uses synthetic data only.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: gdpr-32-security-001
    control-id: gdpr-32
    status: partial
    decision: >
      Account-level technical measures are operational and evidenced;
      application-layer controls and organisational documentation are pending.
    justification: >
      Account-level technical measures are operational and evidenced:
      GuardDuty with MEDIUM+ findings routed to SNS via EventBridge, CloudTrail
      with 90-day retention and S3 delivery, IAM password policy (16+ chars,
      MFA required for admin), account-level S3 public access block, billing
      alarms. Application-level measures (KMS encryption for S3 and DynamoDB,
      TLS enforcement on API Gateway, least-privilege Lambda execution roles)
      are specified in Terraform but not yet provisioned. Organisational measures
      outstanding: no incident response procedure document, no access review
      schedule. Status: partial — automated technical controls evidenced;
      application-layer controls and organisational documentation pending.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - evidence/automated/guardduty-status.json
      - evidence/automated/cloudtrail-status.json
      - evidence/automated/iam-password-policy.json
    compensating-controls:
      - No real personal data processed yet
      - Account-level GuardDuty active

  - id: gdpr-33-incident-response-001
    control-id: gdpr-33
    status: partial
    decision: >
      Automated detection is operational via GuardDuty + SNS; written 72-hour
      notification procedure is now documented (IRP-001). Remaining gap: DPA
      notification template and formal DPO role not yet established; both are
      pre-production requirements.
    justification: >
      Automated detection is operational: GuardDuty findings at MEDIUM severity
      and above trigger an EventBridge rule that publishes to the
      zoo-security-alerts SNS topic. The written incident response procedure
      (IRP-001) has been created at compliance/procedures/incident-response.md
      and covers: (1) personal data scope assessment, (2) severity classification,
      (3) containment steps with CLI references, (4) 72-hour notification timeline,
      (5) DPA notification content requirements (Art. 33(3)), and (6) incident
      register obligations. Outstanding gaps before production: a DPA notification
      template must be created, a legal/DPO contact established, and the procedure
      must be reviewed by the DPO. The compensating control — no real personal data
      in the system — limits current risk. Status: partial — detection automated
      and notification procedure documented; DPA template and DPO role outstanding.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-23T09:00:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - evidence/automated/guardduty-status.json
      - compliance/procedures/incident-response.md
    compensating-controls:
      - Automated GuardDuty detection + SNS alerting operational
      - No real personal data processed yet
      - Written incident response procedure IRP-001 in place

  - id: gdpr-35-dpia-001
    control-id: gdpr-35
    status: not-applicable
    decision: >
      A DPIA is not required for this demo system in its current form;
      determination must be revisited at pre-production review.
    justification: >
      A DPIA is not required at this stage. The current system does not process
      real personal data; it uses only synthetic and test conversations. Under
      the GDPR Art. 35 criteria and the EDPB guidelines on DPIA triggering
      thresholds, a single-purpose demo chatbot with no persistent user
      profiling, no special categories of data, no systematic large-scale
      processing, and no automated decisions affecting individuals does not meet
      any mandatory DPIA trigger. This determination must be revisited before
      production deployment, particularly if the chatbot is made available to
      real users, if conversation logs are retained and linked to identifiable
      individuals, or if the system is integrated with other data sources.
      Status: not-applicable for current prototype; assessment to be repeated
      at pre-production review gate.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  # ── EU AI Act ─────────────────────────────────────────────────────────────

  - id: euaia-4-literacy-001
    control-id: euaia-4
    status: partial
    decision: >
      Implicit AI literacy exists within the engineering team; formal
      documented acknowledgement is outstanding.
    justification: >
      The engineering team has direct knowledge of the system architecture,
      model capabilities, and limitations, as documented in this compliance
      attestation and the system README. Before deploying to any users beyond
      the engineering team, the team will complete a documented AI literacy
      review: a brief written acknowledgement that each operator understands
      (1) what the model can and cannot do, (2) the risk classification
      rationale, (3) the transparency obligations, and (4) the escalation path
      for problematic outputs. For a small team demo system, this acknowledgement
      record satisfies the proportionality principle of Art. 4.
      Status: partial — implicit literacy exists; formal documented
      acknowledgement outstanding.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: euaia-50-1-disclosure-001
    control-id: euaia-50-1
    status: not-satisfied
    decision: >
      The chat UI does not yet exist; AI disclosure is a hard prerequisite
      before any real-user deployment.
    justification: >
      The chat interface does not yet exist. When built, it must display a
      visible label identifying the system as an AI assistant before the first
      user message. Art. 50(1) requires disclosure "at the latest at the time
      of the first interaction" in a "clear and distinguishable manner" — not
      buried in terms of service. The Bedrock agent system prompt will also
      include an explicit instruction to identify itself as an AI system if
      directly asked. The disclosure must be present at the start of each
      session, not only at first onboarding. The B2B "obvious" exception
      (Art. 50(1) in fine) is deliberately not relied upon: the legal test is
      untested, no supervisory authority has published binding guidance, and the
      Code of Practice draft is not yet final. Adding a single disclosure line
      costs nothing. This control becomes enforceable on 2 August 2026.
      Status: not-implemented — UI not yet built; design requirement documented
      and implementation is a sprint task once UI work begins.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: euaia-50-2-content-marking-001
    control-id: euaia-50-2
    status: not-satisfied
    decision: >
      AI-generated content marking is not yet implemented; a clear low-effort
      design approach is identified.
    justification: >
      The chatbot produces text-only responses via the Bedrock API. Response
      metadata should include a machine-readable indicator of AI-generated
      content. Proposed implementation: add an X-AI-Generated: true HTTP
      response header and a corresponding JSON field to all API responses, and
      document this in the API contract. This does not require statistical
      watermarking (not mandated by technical standards under Art. 50(2) for
      text as of April 2026; the Commission's technical standards mandate is
      still pending). The C2PA standard is the emerging approach for rich media
      but is not required for text-only responses. For any documents generated
      by the system (e.g. a compliance report), an AI-generated metadata field
      in the document header is sufficient.
      Status: not-implemented — design approach is clear; implementation is a
      single sprint task when the API layer is built.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: euaia-52-1-gpai-docs-001
    control-id: euaia-52-1
    status: partial
    decision: >
      Provider-side GPAI documentation is available from AWS; deployer-side
      model selection record is captured here, formal document pending.
    justification: >
      Amazon Nova Micro (amazon.nova-micro-v1:0) is the model in use. As a
      deployer rather than a provider, this organisation is not responsible for
      provider-side Annex XI documentation. Amazon Web Services has published
      model cards and capability documentation for Nova models, available
      through the AWS Bedrock console and public documentation. The deployer-side
      record must document: model ID and version selected, date of selection,
      rationale (lowest cost, sufficient capability for demo, no special-risk
      capabilities), known limitations (hallucination propensity, no real-time
      knowledge, context window limits), and the Guardrails configuration
      applied. This record is currently captured here; a separate model
      selection document will be created when the Bedrock Agent is provisioned.
      Status: partial — model selected and rationale captured; formal model
      selection record and Guardrails documentation pending.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
    evidence-refs:
      - evidence/automated/bedrock-model-list.json

  - id: euaia-52-2-copyright-001
    control-id: euaia-52-2
    status: satisfied
    decision: >
      Provider-side copyright compliance is documented by AWS; no deployer-level
      copyright obligation exists for inference use.
    justification: >
      Amazon has published statements on training data provenance for Nova
      models as part of its AWS Responsible AI practices. As a deployer, the
      obligation is to confirm that the model provider has a published copyright
      compliance policy — not to audit the training data ourselves. Amazon's
      published Acceptable Use Policy and model documentation cover this. For
      Mistral AI models (available as fallback), Mistral AI has published
      similar commitments. This control is satisfied at the deployer level with
      reference to provider documentation; no deployer-level copyright
      obligation applies for inference use.
      Status: satisfied — provider documentation referenced.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: euaia-deployer-1-oversight-001
    control-id: euaia-deployer-1
    status: partial
    decision: >
      Engineering team provides oversight during development; organisational
      oversight procedure for user-facing deployment is not yet documented.
    justification: >
      Human oversight in the current prototype consists of the engineering team
      reviewing system outputs during development. For a user-facing deployment,
      the following must be implemented and documented: (1) a designated person
      responsible for monitoring chatbot outputs, (2) a mechanism for users to
      flag problematic responses (feedback button or email), (3) a defined
      review cadence (weekly review of flagged interactions), (4) an escalation
      path if a serious issue is identified, (5) Bedrock Guardrails configuration
      blocking harmful content categories. Items 1-4 are organisational and
      require a brief procedure document. Item 5 is a technical action item in
      the Bedrock configuration. This control is modelled as a template even
      though the system is not high-risk: the question of what meaningful human
      oversight looks like versus ceremonial oversight is the most instructive
      aspect of this compliance layer.
      Status: partial — technical oversight via Guardrails designed;
      organisational oversight procedure not yet documented.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: euaia-deployer-2-risk-class-001
    control-id: euaia-deployer-2
    status: satisfied
    decision: >
      The chatbot is classified as limited-risk under the EU AI Act, not
      high-risk; Annex III categories reviewed and inapplicable.
    justification: >
      The compliance-ops-bedrock chatbot is classified as limited-risk under
      the EU AI Act, not high-risk. This determination is based on a review of
      Annex III high-risk categories: the chatbot is not used in critical
      infrastructure management, education or vocational training decisions,
      employment or worker management, access to essential services (credit,
      social benefits, emergency services), law enforcement, migration or asylum
      decisions, administration of justice, or democratic processes. The sole
      stated purpose is to answer questions about the system's own architecture
      and compliance posture, for demonstration purposes, to an audience of
      engineers and compliance reviewers. This classification must be revisited
      if the intended use case changes.
      Status: satisfied — classification documented with Annex III reference.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)

  - id: euaia-deployer-3-registration-001
    control-id: euaia-deployer-3
    status: not-applicable
    decision: >
      EU AI database registration (Art. 49) is not required; system is
      limited-risk, not high-risk.
    justification: >
      Registration in the EU AI database under Art. 49 is required only for
      high-risk AI systems and GPAI models with systemic risk. This system is
      classified as limited-risk (see euaia-deployer-2-risk-class-001) and
      does not use a GPAI model with systemic risk designation. Registration
      is therefore not required. This control exists to document that
      determination explicitly, so an auditor can confirm the absence of
      registration was a considered decision rather than an oversight.
      Status: not-applicable — limited-risk classification confirmed; Art. 49
      does not apply.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-13T17:30:00Z"
    built-by: Priya (principal engineer, zoo)
