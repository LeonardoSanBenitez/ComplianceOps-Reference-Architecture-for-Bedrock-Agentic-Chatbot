      Both controls are deployed and active as of 2026-04-23.
      The 30-day retention window is the minimum necessary for operational
      debugging; no business need exists beyond this. The rationale is
      documented in ROPA-001 (compliance/procedures/ropa-entry.yaml,
      retention_summary section). Status: satisfied.
    reviewed-by: Priya (principal engineer, zoo)
    reviewed-at: "2026-04-25T08:00:00Z"
